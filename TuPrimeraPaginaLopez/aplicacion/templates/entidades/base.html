{% load static %}
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Sistema de administración para gestión de clientes, productos y ventas" />
        <meta name="author" content="Esteban López" />
        <title>{% block title %}Sistema de Gestión Logístico-Comercial{% endblock %}</title>

        <!-- Favicon -->
        <link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}" />

        <!-- Bootstrap (desde CDN) -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />

        <!-- CSS local -->
        <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    </head>

    <body>
        <div class="d-flex" id="wrapper">
            <!-- Sidebar -->
            <div class="border-end bg-white" id="sidebar-wrapper">
                <div class="sidebar-heading border-bottom bg-light">Panel de Control</div>
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="{% url 'index' %}">Inicio</a>
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="{% url 'productos' %}">Productos</a>
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="{% url 'clientes' %}">Clientes</a>
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="{% url 'sucursales' %}">Sucursales</a>
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="{% url 'vendedores' %}">Vendedores</a>
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="{% url 'ventas' %}">Ventas</a>
                </div>
            </div>

            <!-- Page content wrapper -->
            <div id="page-content-wrapper">
                <!-- Top navigation -->
                <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom shadow-sm">
                    <div class="container-fluid">
                        <button class="btn btn-primary" id="sidebarToggle">Menú</button>
                        <div class="collapse navbar-collapse" id="navbarSupportedContent">
                            <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                                <a class="nav-link" href="{% url 'quien_soy' %}">¿Quién soy?</a>
                            </ul>
                        </div>
                    </div>
                </nav>

                <!-- Main content -->
                <main class="container-fluid py-4">
                    {% block content %}
                    {% endblock %}
                </main>
            </div>
        </div>

        <!-- Bootstrap core JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- JS local -->
        <script src="{% static 'js/scripts.js' %}"></script>
    </body>
</html>
