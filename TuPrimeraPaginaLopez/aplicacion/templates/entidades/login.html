{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | TuPrimeraPaginaLopez</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center" style="height: 100vh;">
        <div class="card shadow-lg border-0 p-4" style="max-width: 380px; width: 100%; border-radius: 1rem;">
            <h4 class="text-center text-primary fw-bold mb-4">🔐 Iniciar Sesión</h4>

            <form method="POST" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuario</label>
                    <input type="text" name="username" class="form-control" placeholder="Ingresá tu usuario" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="Ingresá tu contraseña" required>
                </div>

                {% if messages %}
                    <div class="alert alert-danger py-2">
                        {% for message in messages %}
                            {{ message }}
                        {% endfor %}
                    </div>
                {% endif %}

                <button type="submit" class="btn btn-primary w-100 mt-3">Ingresar</button>
            </form>

            <p class="text-center text-muted mt-3 small">
                © 2025 TuPrimeraPaginaLopez
            </p>
        </div>
    </div>
</body>
</html>
